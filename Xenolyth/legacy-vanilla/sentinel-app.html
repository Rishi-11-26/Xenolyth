<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sentinel — Private Beta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #010308; color: var(--text-base); min-height: 100vh; display: flex; flex-direction: column; font-family: var(--font-sans); overflow-x: hidden; }
    a { text-decoration: none; }

    /* ── Loading ── */
    .lock-screen {
      position: fixed; inset: 0; background: #010308;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 1rem; z-index: 9999; transition: opacity .5s;
    }
    .lock-pulse { width: 44px; height: 44px; border: 2px solid rgba(0,212,255,.2); border-top-color: var(--cyan); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Nav ── */
    .s-nav {
      border-bottom: 1px solid rgba(0,212,255,.1);
      background: rgba(1,3,8,.9); backdrop-filter: blur(16px);
      padding: .875rem 1.5rem;
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 100;
    }
    .s-brand { display: flex; align-items: center; gap: .75rem; }
    .s-logo-hex { width: 30px; height: 30px; background: linear-gradient(135deg, var(--cyan), #0066aa); border-radius: .375rem; display: grid; place-items: center; font-size: .9rem; color: #000; font-weight: 900; }
    .s-product-name { font-family: var(--font-mono); font-weight: 700; letter-spacing: 3px; color: var(--text-hi); font-size: 1rem; }
    .s-product-sub { font-family: var(--font-mono); font-size: .55rem; color: var(--text-lo); letter-spacing: 2px; text-transform: uppercase; }
    .s-nav-links { display: flex; gap: 1rem; align-items: center; }
    .s-link { color: var(--text-lo); font-size: .8125rem; font-weight: 500; transition: color .2s; }
    .s-link:hover { color: var(--cyan); }

    /* ── Layout ── */
    .s-layout { flex: 1; display: grid; grid-template-columns: 1fr 300px; min-height: 0; }
    @media(max-width: 900px) { .s-layout { grid-template-columns: 1fr; } }

    /* ── Main Panel ── */
    .s-main { display: flex; flex-direction: column; border-right: 1px solid rgba(0,212,255,.08); }
    .s-section-header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.5rem; border-bottom: 1px solid rgba(0,212,255,.08); }
    .s-section-label { font-family: var(--font-mono); font-size: .65rem; color: var(--cyan); text-transform: uppercase; letter-spacing: 3px; }

    /* ── Radar ── */
    .s-radar-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; min-height: 400px; position: relative; }
    .s-radar {
      width: min(460px, 90vmin); height: min(460px, 90vmin);
      border: 1px solid rgba(0,212,255,.2); border-radius: 50%;
      position: relative; overflow: hidden;
      background: radial-gradient(circle at center, rgba(0,212,255,.04) 0%, transparent 70%);
    }
    .s-radar-ring { position: absolute; top:50%; left:50%; transform:translate(-50%,-50%); border: 1px dashed rgba(0,212,255,.1); border-radius: 50%; }
    .s-radar-ring-1 { width: 33%; height: 33%; }
    .s-radar-ring-2 { width: 66%; height: 66%; }
    .s-radar-ring-3 { width: 100%; height: 100%; }
    .s-radar-cross { position: absolute; inset: 0; }
    .s-radar-cross::before, .s-radar-cross::after { content:''; position:absolute; background:rgba(0,212,255,.08); }
    .s-radar-cross::before { top:50%;left:0;right:0;height:1px;transform:translateY(-50%); }
    .s-radar-cross::after { left:50%;top:0;bottom:0;width:1px;transform:translateX(-50%); }
    .s-radar-sweep { position: absolute; top:50%; left:50%; width:50%; height:2px; transform-origin: left center; background: linear-gradient(90deg, rgba(0,212,255,.8), transparent); animation: sweep 4s linear infinite; }
    .s-radar-sweep::after { content:''; position:absolute; right:0; top:-40px; bottom:-40px; width:40px; background: conic-gradient(from 0deg, transparent, rgba(0,212,255,.06)); }
    @keyframes sweep { to { transform: translateY(-50%) rotate(360deg); } }

    /* Blip */
    .s-blip {
      position: absolute; width: 8px; height: 8px; border-radius: 50%; transform: translate(-50%,-50%);
      background: var(--cyan); box-shadow: 0 0 12px var(--cyan);
      animation: blip-pulse 3s ease-in-out infinite;
    }
    .s-blip--amber { background:#ffbd2e; box-shadow:0 0 12px #ffbd2e; animation-delay:.5s; }
    .s-blip--red   { background:#ff6b6b; box-shadow:0 0 12px #ff6b6b; animation-delay:1s; }
    @keyframes blip-pulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }

    /* Telemetry strip */
    .s-tele { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1px; background: rgba(0,212,255,.08); border-top: 1px solid rgba(0,212,255,.08); }
    .s-tele-cell { background: #010308; padding: .875rem 1.25rem; }
    .s-tele-val { font-family: var(--font-mono); font-size: 1rem; font-weight: 700; color: var(--cyan); }
    .s-tele-key { font-family: var(--font-mono); font-size: .6rem; color: var(--text-lo); text-transform: uppercase; letter-spacing: 2px; margin-top: .125rem; }

    /* ── Sidebar ── */
    .s-sidebar { display: flex; flex-direction: column; overflow-y: auto; }
    .s-sidebar-section { padding: 1.25rem; border-bottom: 1px solid rgba(0,212,255,.08); }
    .s-sidebar-section:last-child { border-bottom: none; flex: 1; }

    /* Notifs */
    .s-notif { padding: .75rem; border-left: 2px solid var(--cyan); background: rgba(0,212,255,.04); margin-bottom: .625rem; border-radius: 0 .375rem .375rem 0; animation: fadeSlide .3s ease; }
    .s-notif--amber { border-left-color: #ffbd2e; background: rgba(255,189,46,.04); }
    @keyframes fadeSlide { from{opacity:0;transform:translateY(-6px);} to{opacity:1;transform:translateY(0);} }
    .s-notif-time { font-family: var(--font-mono); font-size: .6rem; color: var(--text-lo); margin-bottom: .25rem; }
    .s-notif-msg { font-size: .8rem; color: var(--text-lo); line-height: 1.4; }
    .s-notif-msg strong { color: var(--text-hi); }

    /* Watchlist */
    .s-wl-item { display: flex; justify-content: space-between; align-items: center; padding: .625rem 0; border-bottom: 1px solid rgba(255,255,255,.04); }
    .s-wl-item:last-child { border-bottom: none; }
    .s-wl-name { font-family: var(--font-mono); font-size: .75rem; color: var(--text-hi); }
    .s-wl-status { font-size: .65rem; color: var(--cyan); }
    .s-wl-drop { background: transparent; border: 1px solid rgba(255,255,255,.08); color: var(--text-lo); border-radius: .25rem; padding: .2rem .45rem; font-size: .65rem; cursor: pointer; transition: all .2s; }
    .s-wl-drop:hover { color: #ff6b6b; border-color: #ff6b6b; }

    .s-add-form { display: flex; gap: .5rem; margin-top: .875rem; }
    .s-add-input { flex: 1; background: rgba(0,212,255,.05); border: 1px solid rgba(0,212,255,.15); color: var(--text-hi); padding: .5rem .75rem; font-size: .75rem; font-family: var(--font-mono); border-radius: .375rem; outline: none; transition: border-color .2s; }
    .s-add-input:focus { border-color: rgba(0,212,255,.4); }
    .s-add-btn { background: rgba(0,212,255,.12); color: var(--cyan); border: 1px solid rgba(0,212,255,.2); padding: .5rem .875rem; font-size: .75rem; font-weight: 700; border-radius: .375rem; cursor: pointer; transition: all .2s; white-space: nowrap; }
    .s-add-btn:hover { background: rgba(0,212,255,.2); }

    @media(max-width:640px) {
      .s-nav { padding: .75rem 1rem; }
      .s-tele { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

  <div id="lock-screen" class="lock-screen">
    <div class="lock-pulse"></div>
    <span style="font-family:var(--font-mono);font-size:.7rem;letter-spacing:3px;color:var(--cyan);">INITIALISING SECURE CHANNEL</span>
  </div>

  <nav class="s-nav">
    <div class="s-brand">
      <div class="s-logo-hex">⬡</div>
      <div>
        <div class="s-product-name">SENTINEL</div>
        <div class="s-product-sub">Earth Situational Awareness</div>
      </div>
      <span class="badge badge--cyan" style="margin-left:.5rem;transform:scale(.8);transform-origin:left;"><span class="badge__dot"></span>Private Beta · v1</span>
    </div>
    <div class="s-nav-links">
      <span style="font-family:var(--font-mono);font-size:.65rem;color:var(--text-lo);display:none;" id="s-user-label"></span>
      <a href="dashboard.html" class="s-link">Portal</a>
      <a href="#" id="logout-btn" class="s-link" style="color:#ff6b6b;">Disconnect</a>
    </div>
  </nav>

  <div class="s-layout">

    <!-- Main Panel -->
    <section class="s-main">
      <div class="s-section-header">
        <div class="s-section-label">Proximity Radar</div>
        <div style="display:flex;align-items:center;gap:.5rem;">
          <div style="width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan);animation:blip-pulse 2s infinite;"></div>
          <span style="font-family:var(--font-mono);font-size:.65rem;color:var(--cyan);">SYNC ACTIVE</span>
        </div>
      </div>

      <div class="s-radar-wrap">
        <div class="s-radar">
          <div class="s-radar-ring s-radar-ring-1"></div>
          <div class="s-radar-ring s-radar-ring-2"></div>
          <div class="s-radar-ring s-radar-ring-3"></div>
          <div class="s-radar-cross"></div>
          <div class="s-radar-sweep"></div>
          <!-- Static blips (demo data) -->
          <div class="s-blip"          style="top:28%;left:38%;"></div>
          <div class="s-blip s-blip--amber" style="top:62%;left:68%;"></div>
          <div class="s-blip"          style="top:44%;left:22%;animation-delay:.8s;"></div>
          <div class="s-blip s-blip--red"   style="top:72%;left:42%;animation-delay:1.5s;"></div>
          <div class="s-blip"          style="top:20%;left:58%;animation-delay:.3s;"></div>
        </div>
      </div>

      <!-- Telemetry Strip -->
      <div class="s-tele">
        <div class="s-tele-cell"><div class="s-tele-val" id="tele-objects">—</div><div class="s-tele-key">Tracked Objects</div></div>
        <div class="s-tele-cell"><div class="s-tele-val" id="tele-iss">LOCKED</div><div class="s-tele-key">ISS Status</div></div>
        <div class="s-tele-cell"><div class="s-tele-val" id="tele-solar">NOMINAL</div><div class="s-tele-key">Solar Activity</div></div>
        <div class="s-tele-cell"><div class="s-tele-val" id="tele-uptime">—</div><div class="s-tele-key">System Uptime</div></div>
      </div>
    </section>

    <!-- Sidebar -->
    <aside class="s-sidebar">

      <!-- System Intel -->
      <div class="s-sidebar-section">
        <div class="s-section-label" style="margin-bottom:.875rem;">System Intel</div>
        <div id="system-notifs">
          <div style="text-align:center;color:var(--text-lo);font-size:.75rem;padding:1.5rem 0;">Awaiting signals…</div>
        </div>
      </div>

      <!-- Watchlist -->
      <div class="s-sidebar-section">
        <div class="s-section-label" style="margin-bottom:.875rem;">Active Watchlist</div>
        <div id="watchlist-list">
          <div style="text-align:center;color:var(--text-lo);font-size:.75rem;padding:1rem 0;">No targets tracked.</div>
        </div>
        <form id="add-target-form" class="s-add-form">
          <input class="s-add-input" id="target-input" type="text" placeholder="Target ID (e.g. NEO-2024-BX1)" autocomplete="off" />
          <button type="submit" class="s-add-btn">Track</button>
        </form>
      </div>

    </aside>
  </div>

  <script type="module" src="js/sentinel-app.js"></script>
</body>
</html>
