<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <!-- Metallic Chrome Gradients -->
    <linearGradient id="metal-primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E2E8F0" />
      <stop offset="35%" stop-color="#94A3B8" />
      <stop offset="50%" stop-color="#475569" />
      <stop offset="65%" stop-color="#CBD5E1" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>

    <linearGradient id="metal-secondary" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F1F5F9" />
      <stop offset="40%" stop-color="#CBD5E1" />
      <stop offset="60%" stop-color="#64748B" />
      <stop offset="85%" stop-color="#94A3B8" />
      <stop offset="100%" stop-color="#334155" />
    </linearGradient>

    <!-- Neon Glow Gradient -->
    <linearGradient id="glow-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F5BFF" />
      <stop offset="50%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#2DD4BF" />
    </linearGradient>

    <!-- Shadow filter for depth -->
    <filter id="depth-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.6" />
    </filter>

    <!-- Neon glow filter -->
    <filter id="neon-glow-filter" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#depth-shadow)">
    <!-- Main Diagonal Bar (Top-Left to Bottom-Right) -->
    <path d="M 28 20 L 52 20 L 92 100 L 68 100 Z" fill="url(#metal-primary)" />

    <!-- Top-Right Diagonal Segment (Top-Right to Center-Left) -->
    <path d="M 92 20 L 68 20 L 54 48 L 78 48 Z" fill="url(#metal-secondary)" />

    <!-- Bottom-Left Diagonal Segment (Center-Right to Bottom-Left) -->
    <path d="M 42 72 L 66 72 L 52 100 L 28 100 Z" fill="url(#metal-secondary)" />

    <!-- Inner Neon Glow Highlights (Top-Right Cut Edge) -->
    <path d="M 54 48 L 78 48" stroke="url(#glow-gradient)" stroke-width="2.5" stroke-linecap="round" fill="none" filter="url(#neon-glow-filter)" opacity="0.9" />

    <!-- Inner Neon Glow Highlights (Bottom-Left Cut Edge) -->
    <path d="M 42 72 L 66 72" stroke="url(#glow-gradient)" stroke-width="2.5" stroke-linecap="round" fill="none" filter="url(#neon-glow-filter)" opacity="0.9" />

    <!-- Sleek inner accents for 3D metallic feel -->
    <path d="M 30 22 L 50 22" stroke="#FFFFFF" stroke-width="0.75" opacity="0.4" fill="none" />
    <path d="M 70 98 L 90 98" stroke="#000000" stroke-width="1" opacity="0.5" fill="none" />
  </g>
</svg>
