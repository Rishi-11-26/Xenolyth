<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="100%" height="100%">
  <defs>
    <!-- Metallic Chrome Gradients for Logo Mark -->
    <linearGradient id="metal-primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E2E8F0" />
      <stop offset="35%" stop-color="#94A3B8" />
      <stop offset="50%" stop-color="#475569" />
      <stop offset="65%" stop-color="#CBD5E1" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>

    <linearGradient id="metal-secondary" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F1F5F9" />
      <stop offset="40%" stop-color="#CBD5E1" />
      <stop offset="60%" stop-color="#64748B" />
      <stop offset="85%" stop-color="#94A3B8" />
      <stop offset="100%" stop-color="#334155" />
    </linearGradient>

    <!-- Metallic Gradient for Text Wordmark -->
    <linearGradient id="text-metal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="40%" stop-color="#E2E8F0" />
      <stop offset="70%" stop-color="#94A3B8" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>

    <!-- Neon Glow Gradient -->
    <linearGradient id="glow-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F5BFF" />
      <stop offset="50%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#2DD4BF" />
    </linearGradient>

    <!-- Depth Shadow -->
    <filter id="depth-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.5" />
    </filter>

    <!-- Neon Glow Filter -->
    <filter id="neon-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#depth-shadow)">
    <!-- ── LOGO MARK (Positioned Left) ── -->
    <g transform="translate(10, 10) scale(0.5)">
      <!-- Main Diagonal Bar -->
      <path d="M 28 20 L 52 20 L 92 100 L 68 100 Z" fill="url(#metal-primary)" />
      <!-- Top-Right Segment -->
      <path d="M 92 20 L 68 20 L 54 48 L 78 48 Z" fill="url(#metal-secondary)" />
      <!-- Bottom-Left Segment -->
      <path d="M 42 72 L 66 72 L 52 100 L 28 100 Z" fill="url(#metal-secondary)" />
      <!-- Inner Glow Highlights -->
      <path d="M 54 48 L 78 48" stroke="url(#glow-gradient)" stroke-width="3" stroke-linecap="round" fill="none" filter="url(#neon-glow)" opacity="0.9" />
      <path d="M 42 72 L 66 72" stroke="url(#glow-gradient)" stroke-width="3" stroke-linecap="round" fill="none" filter="url(#neon-glow)" opacity="0.9" />
    </g>

    <!-- ── WORDMARK "XENOLYTH" (Positioned Right) ── -->
    <text x="80" y="47" 
          font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
          font-weight="700" 
          font-size="28" 
          letter-spacing="0.16em" 
          fill="url(#text-metal)">XENOLYTH</text>
          
    <text x="82" y="60" 
          font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
          font-weight="500" 
          font-size="8.5" 
          letter-spacing="0.32em" 
          fill="#A1A1AA" 
          opacity="0.8">AUTONOMOUS SYSTEMS</text>
  </g>
</svg>
